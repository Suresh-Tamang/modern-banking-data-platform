modern_banking_warehouse:
  outputs:
    dev:
      type: postgres
      # We use the environment variables defined in docker-compose
      host: "{{ env_var('DBT_POSTGRES_HOST') }}"
      user: "{{ env_var('DBT_POSTGRES_USER') }}"
      password: "{{ env_var('DBT_POSTGRES_PW') }}"
      port: 5432
      dbname: "{{ env_var('DBT_POSTGRES_DB') }}"
      schema: public
      threads: 4
  target: dev