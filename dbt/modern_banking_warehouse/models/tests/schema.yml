version: 2

models:

  - name: silver_customer
    description: Cleaned customer data
    columns:

      - name: customer_id
        tests:
          - unique
          - not_null

      - name: email
        tests:
          - unique
          - not_null

      - name: date_of_birth
        tests:
          - not_null

  - name: silver_account
    columns:

      - name: account_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null

  - name: silver_transaction
    columns:

      - name: transaction_id
        tests:
          - unique
          - not_null

      - name: account_id
        tests:
          - not_null