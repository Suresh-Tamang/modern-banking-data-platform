version: '3.8'

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432

services:
  # Metadata Database (Airflow & Superset)
  postgres:
    image: postgres:15-alpine
    container_name: metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dedicated Data Warehouse
  warehouse_postgres:
    image: postgres:15-alpine
    container_name: warehouse_db
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    volumes:
      - ./db/postgres_warehouse:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  airflow:
    image: apache/airflow:2.7.0
    container_name: airflow_webserver
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@metadata_db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Separating init from run ensures the DB is migrated before the webserver starts
    command: >
      bash -c "airflow db upgrade && 
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && 
      airflow webserver"

  superset:
    image: apache/superset:3.0.0-py310
    container_name: superset
    environment:
      SUPERSET_SECRET_KEY: "gnv1QiJWY7Na4zgQ7COrKDdyvvFA/qVh5BQ5pwyDMagkCiwdqXVjcwvx"
      SQLALCHEMY_DATABASE_URI: postgresql://airflow:airflow@metadata_db:5432/superset
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "superset db upgrade && 
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin || true && 
      superset init && 
      superset run -p 8088 -h 0.0.0.0 --with-threads"

  python_etl:
    build: .
    container_name: python_etl
    tty: true
    stdin_open: true
    volumes:
      - ./pipeline:/app/etl
    working_dir: /app/etl
    environment:
      # Use the service names from docker-compose as hostnames
      WAREHOUSE_HOST: warehouse_postgres
      WAREHOUSE_DB: warehouse
      WAREHOUSE_USER: warehouse
      WAREHOUSE_PASSWORD: warehouse
    restart: on-failure
    depends_on:
      - warehouse_postgres
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.5.0
    container_name: dbt_runner
    entrypoint: /bin/sh -c "sleep infinity"
    volumes:
      - ./dbt:/usr/app/dbt  # Standard dbt working directory
    environment:
      - DBT_PROFILES_DIR=/usr/app/dbt
      - DBT_POSTGRES_HOST=warehouse_postgres
      - DBT_POSTGRES_USER=warehouse
      - DBT_POSTGRES_PW=warehouse
      - DBT_POSTGRES_DB=warehouse
    working_dir: /usr/app/dbt
    depends_on:
      - warehouse_postgres